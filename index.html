<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль Алекса+</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #182533;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0e1621;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            width: flex;
            max-width: 400px;
            background: #17212b;
            border-radius: 20px;
            padding: 30px 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #2481cc, #005691);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(36, 129, 204, 0.4);
        }
        h2 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            font-weight: 600;
        }
        .username-tg {
            color: #4f9cd8;
            font-size: 15px;
            margin-bottom: 25px;
            display: block;
        }
        .info-box {
            background: #202b36;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #e67e22;
        }
        .info-box.premium-border {
            border-left: 4px solid #2ecc71;
        }
        .info-title {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 16px;
            font-weight: bold;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-base { background: #e67e22; color: #fff; }
        .badge-premium { background: #2ecc71; color: #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        
        .limits-container {
            background: #202b36;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
        }
        .limits-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #10171e;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 60%; /* 3 из 5 запросов */
            height: 100%;
            background: #2481cc;
            border-radius: 10px;
        }
        .btn-pay {
            width: 100%;
            background: linear-gradient(90deg, #2481cc, #1a639b);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(36, 129, 204, 0.3);
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-pay:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .sub-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <div class="avatar" id="avatar-letter">А</div>
        </div>
        
        <h2 id="first-name">Алекс</h2>
        <span class="username-tg" id="username">@username</span>
        
        <div class="info-box" id="status-box">
            <div>
                <div class="info-title">Статус подписки</div>
                <div class="info-value" id="status-text">Базовый доступ</div>
            </div>
            <span class="badge badge-base" id="status-badge">Base</span>
        </div>

        <div class="limits-container">
            <div class="limits-header">
                <span style="color: #7f8c8d;">Лимиты ИИ</span>
                <span id="limit-text" style="font-weight: bold;">3 из 5 запросов</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-bar-fill"></div>
            </div>
            <span style="font-size: 11px; color: #7f8c8d; display: block; margin-top: 6px;">Обновляется каждые 24 часа</span>
        </div>
        
        <button class="btn-pay" onclick="buyPremium()">🚀 Активировать Premium • 2.99 €</button>
        <span class="sub-text">Безлимитные запросы и приоритетная поддержка</span>
    </div>

    <script>
        // Инициализация WebApp Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Получаем реальные данные из Telegram
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('first-name').innerText = user.first_name;
            document.getElementById('username').innerText = user.username ? '@' + user.username : '';
            document.getElementById('avatar-letter').innerText = user.first_name.charAt(0).toUpperCase();
        }

        function buyPremium() {
            // Триггерим событие покупки обратно в Python-бота
            tg.sendData("buy_premium_clicked");
            tg.close(); // Закрываем окно
        }
    </script>
</body>
</html>
